<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoNX — AI Lead Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1f2e, #0d1b2a); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d3748; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 20px; font-weight: 800; color: #fff; }
  .logo span { color: #4ade80; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4ade80; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media(min-width:600px){ .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
  @media(min-width:900px){ .kpi-grid { grid-template-columns: repeat(6, 1fr); } }
  .kpi-card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 16px; text-align: center; }
  .kpi-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .kpi-label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: .5px; }

  .section-title { font-size: 14px; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

  .tier-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media(min-width:600px){ .tier-grid { grid-template-columns: repeat(4, 1fr); } }
  .tier-card { border-radius: 12px; padding: 16px; text-align: center; }
  .tier-card.sales-ready { background: linear-gradient(135deg,#065f46,#047857); border: 1px solid #10b981; }
  .tier-card.hot         { background: linear-gradient(135deg,#7f1d1d,#991b1b); border: 1px solid #ef4444; }
  .tier-card.warm        { background: linear-gradient(135deg,#78350f,#92400e); border: 1px solid #f59e0b; }
  .tier-card.cold        { background: linear-gradient(135deg,#1e3a5f,#1e40af); border: 1px solid #3b82f6; }
  .tier-count { font-size: 36px; font-weight: 900; }
  .tier-name  { font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-top: 4px; opacity: .9; }
  .tier-pct   { font-size: 11px; opacity: .7; margin-top: 2px; }

  .bar-section { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { width: 100px; font-size: 12px; color: #a0aec0; flex-shrink: 0; }
  .bar-track { flex: 1; background: #2d3748; border-radius: 6px; height: 20px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 6px; transition: width .6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 11px; font-weight: 700; color: #fff; }

  .table-wrap { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 16px; border-bottom: 1px solid #2d3748; display: flex; justify-content: space-between; align-items: center; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { background: #141820; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; color: #718096; letter-spacing: .5px; white-space: nowrap; }
  td { padding: 11px 14px; border-top: 1px solid #2d3748; font-size: 13px; white-space: nowrap; }
  tr:hover td { background: #1e2535; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .badge-sales-ready { background: #065f46; color: #6ee7b7; border: 1px solid #10b981; }
  .badge-hot         { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
  .badge-warm        { background: #78350f; color: #fcd34d; border: 1px solid #f59e0b; }
  .badge-cold        { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }

  .score-bar { display: flex; align-items: center; gap: 6px; }
  .score-mini { width: 60px; background: #2d3748; border-radius: 4px; height: 6px; overflow: hidden; }
  .score-mini-fill { height: 100%; border-radius: 4px; }

  .sentiment-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .footer { text-align: center; padding: 20px; color: #4a5568; font-size: 12px; }
  .footer a { color: #4ade80; text-decoration: none; }
  .loading { text-align: center; padding: 60px; color: #718096; }
  .spinner { width: 40px; height: 40px; border: 3px solid #2d3748; border-top-color: #4ade80; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Algo<span>NX</span> <span style="color:#718096;font-weight:400;font-size:13px">AI Lead Dashboard</span></div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div style="font-size:11px;color:#718096" id="lastRefresh">Loading...</div>
  </div>
</div>

<div class="container">
  <div id="app"><div class="loading"><div class="spinner"></div>Loading dashboard...</div></div>
</div>

<div class="footer">Powered by <a href="https://stricent.in" target="_blank">Stricent Technologies</a> &nbsp;|&nbsp; Auto-refreshes every 30 seconds</div>

<script>
const AIRTABLE_TOKEN = 'patVZVdKizbPtpWLc.57da0741df025c978e7956a085a539ae6af2788d1146630bfac377093394b61d';
const BASE_ID = 'appgUJs6oohjCZ8X0';
const TABLE_ID = 'tblQ3epYx6UXFv8F4';

async function fetchAllRecords() {
  let all = [], offset = null;
  do {
    const url = 'https://api.airtable.com/v0/' + BASE_ID + '/' + TABLE_ID + '?pageSize=100' + (offset ? '&offset=' + offset : '');
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN } });
    const data = await res.json();
    all = all.concat(data.records || []);
    offset = data.offset || null;
  } while (offset);
  return all;
}

function scoreColor(s) {
  if (s >= 120) return '#10b981';
  if (s >= 80)  return '#f59e0b';
  if (s >= 50)  return '#3b82f6';
  return '#6b7280';
}
function tierBadge(t) {
  const map = {'SALES READY':'sales-ready','HOT':'hot','WARM':'warm','COLD':'cold'};
  return '<span class="badge badge-'+(map[t]||'cold')+'">'+(t||'—')+'</span>';
}
function sentDot(s) {
  const colors = {very_interested:'#10b981',interested:'#4ade80',neutral:'#f59e0b',unknown:'#6b7280',not_interested:'#ef4444'};
  return '<span class="sentiment-dot" style="background:'+(colors[s]||'#6b7280')+'"></span>'+(s||'unknown').replace(/_/g,' ');
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function render(records) {
  const total = records.length;
  const byTier = {'SALES READY':0,'HOT':0,'WARM':0,'COLD':0};
  let totalScore=0, answered=0, wpSent=0;
  records.forEach(r => {
    const f = r.fields||{};
    if (byTier[f.Tier]!==undefined) byTier[f.Tier]++;
    totalScore += (f['Lead Score']||0);
    if (f['Call Status']==='answered') answered++;
    if (f['WhatsApp Sent']) wpSent++;
  });
  const avgScore = total ? Math.round(totalScore/total) : 0;
  const answerRate = total ? Math.round(answered/total*100) : 0;
  const sorted = [...records].sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime)).slice(0,100);
  const tierColors = {'SALES READY':'#10b981','HOT':'#ef4444','WARM':'#f59e0b','COLD':'#3b82f6'};

  document.getElementById('app').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value" style="color:#e2e8f0">${total}</div><div class="kpi-label">Total Leads</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#10b981">${byTier['SALES READY']}</div><div class="kpi-label">Sales Ready</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#ef4444">${byTier['HOT']}</div><div class="kpi-label">Hot Leads</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#f59e0b">${answerRate}%</div><div class="kpi-label">Answer Rate</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#4ade80">${avgScore}</div><div class="kpi-label">Avg Score</div></div>
      <div class="kpi-card"><div class="kpi-value" style="color:#818cf8">${wpSent}</div><div class="kpi-label">WhatsApp Sent</div></div>
    </div>

    <div class="section-title">Lead Tiers</div>
    <div class="tier-grid">
      <div class="tier-card sales-ready"><div class="tier-count">${byTier['SALES READY']}</div><div class="tier-name">SALES READY</div><div class="tier-pct">${total?Math.round(byTier['SALES READY']/total*100):0}%</div></div>
      <div class="tier-card hot"><div class="tier-count">${byTier['HOT']}</div><div class="tier-name">HOT</div><div class="tier-pct">${total?Math.round(byTier['HOT']/total*100):0}%</div></div>
      <div class="tier-card warm"><div class="tier-count">${byTier['WARM']}</div><div class="tier-name">WARM</div><div class="tier-pct">${total?Math.round(byTier['WARM']/total*100):0}%</div></div>
      <div class="tier-card cold"><div class="tier-count">${byTier['COLD']}</div><div class="tier-name">COLD</div><div class="tier-pct">${total?Math.round(byTier['COLD']/total*100):0}%</div></div>
    </div>

    <div class="section-title">Score Distribution</div>
    <div class="bar-section">
      ${Object.entries(byTier).map(([tier,count])=>{
        const pct=total?Math.round(count/total*100):0;
        return `<div class="bar-row">
          <div class="bar-label">${tier}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${tierColors[tier]}">${pct>10?pct+'%':''}</div></div>
          <div style="font-size:12px;color:#a0aec0;width:30px;text-align:right">${count}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">All Leads</div>
    <div class="table-wrap">
      <div class="table-header">
        <span style="font-size:13px;color:#e2e8f0">Total: ${total} leads</span>
        <span style="font-size:11px;color:#718096">Latest first</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Name</th><th>Phone</th><th>City</th><th>Source</th>
            <th>Call</th><th>Duration</th><th>Sentiment</th>
            <th>Score</th><th>Tier</th><th>Next Action</th><th>Date</th>
          </tr></thead>
          <tbody>
          ${sorted.map(r=>{
            const f=r.fields||{};
            const sc=f['Lead Score']||0;
            const dur=f['Call Duration (sec)']||0;
            const mins=Math.floor(dur/60),secs=dur%60;
            return `<tr>
              <td style="font-weight:600">${f.Name||'—'}</td>
              <td style="color:#718096">${f.Phone||'—'}</td>
              <td>${f.City||'—'}</td>
              <td>${f.Source||'—'}</td>
              <td style="color:${f['Call Status']==='answered'?'#10b981':'#6b7280'}">${f['Call Status']||'—'}</td>
              <td>${dur?mins+'m '+secs+'s':'—'}</td>
              <td>${sentDot(f.Sentiment)}</td>
              <td><div class="score-bar"><span style="font-weight:700;color:${scoreColor(sc)}">${sc}</span><div class="score-mini"><div class="score-mini-fill" style="width:${Math.round(sc/155*100)}%;background:${scoreColor(sc)}"></div></div></div></td>
              <td>${tierBadge(f.Tier)}</td>
              <td style="color:#a0aec0;max-width:180px;overflow:hidden;text-overflow:ellipsis">${f['Next Action']||'—'}</td>
              <td style="color:#718096">${fmtDate(r.createdTime)}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function refresh() {
  try {
    const data = await fetchAllRecords();
    render(data);
    document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
  } catch(e) {
    document.getElementById('lastRefresh').textContent = 'Error: ' + e.message;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
